<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>.pen Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
    }
    
    /* 全屏画布 */
    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }
    
    /* 浮动控制面板 */
    .control-panel {
      position: fixed;
      top: 16px;
      left: 16px;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .panel-header {
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .panel-header .logo {
      width: 24px;
      height: 24px;
      background: #3b82f6;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
      font-weight: bold;
    }
    
    .panel-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }
    button:hover { background: #2563eb; }
    button.secondary {
      background: rgba(255,255,255,0.1);
    }
    button.secondary:hover { background: rgba(255,255,255,0.2); }
    
    .zoom-control {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #94a3b8;
      font-size: 13px;
    }
    
    #zoomSlider {
      width: 80px;
      cursor: pointer;
    }
    
    .info {
      color: #64748b;
      font-size: 11px;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 12px;
    }
    
    /* 拖放覆盖 */
    .drag-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(59, 130, 246, 0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .drag-overlay.active {
      display: flex;
    }
    .drag-overlay p {
      color: white;
      font-size: 32px;
      font-weight: bold;
    }
    
    /* 隐藏面板按钮 */
    .toggle-panel {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 99;
      display: none;
    }
    .panel-hidden .control-panel {
      display: none;
    }
    .panel-hidden .toggle-panel {
      display: block;
    }
    
    /* 组件面板 */
    .components-panel {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      padding: 16px;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      max-width: 280px;
      max-height: 70vh;
      overflow-y: auto;
    }
    
    .components-panel h3 {
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .components-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .component-category {
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 8px;
    }
    
    .category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 4px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }
    
    .category-header:hover {
      color: #3b82f6;
    }
    
    .category-header .count {
      font-size: 11px;
      color: #64748b;
      background: rgba(255,255,255,0.1);
      padding: 2px 8px;
      border-radius: 10px;
    }
    
    .category-items {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding-left: 4px;
    }
    
    .component-item {
      padding: 6px 10px;
      background: rgba(255,255,255,0.03);
      border-radius: 4px;
      cursor: pointer;
      color: #94a3b8;
      font-size: 12px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .component-item:hover {
      background: rgba(59, 130, 246, 0.15);
      color: #fff;
    }
    
    .component-item.active {
      background: rgba(59, 130, 246, 0.3);
      color: #fff;
    }
    
    .component-item .comp-name {
      font-weight: 500;
    }
    
    .component-item .comp-variant {
      font-size: 10px;
      color: #64748b;
      margin-left: auto;
    }
    
    .component-item.active .comp-variant {
      color: #93c5fd;
    }
    
    .no-components {
      color: #64748b;
      font-size: 12px;
      text-align: center;
      padding: 20px;
    }
    
    .toggle-components {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 99;
      display: none;
    }
    
    .components-hidden .components-panel {
      display: none;
    }
    
    .components-hidden .toggle-components {
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div class="control-panel">
    <div class="panel-header">
      <div class="logo">P</div>
      <span>.pen Viewer</span>
    </div>
    
    <div class="panel-row">
      <button onclick="loadSample()">Reload</button>
      <button class="secondary" onclick="resetView()">Reset View</button>
      <button class="secondary" onclick="downloadCanvas()">⬇ PNG</button>
    </div>
    
    <div class="panel-row">
      <button id="themeBtn" onclick="toggleTheme()">🌙 Dark</button>
    </div>
    
    <div class="zoom-control">
      <span>Zoom:</span>
      <input type="range" id="zoomSlider" min="25" max="400" value="100" onchange="setZoom(this.value)">
      <span id="zoomValue">100%</span>
    </div>
    
    <div class="info">
      Canvas: <span id="canvasSize">-</span><br>
      🖱️ Drag to pan | Scroll to zoom<br>
      Drop .pen file to view
    </div>
  </div>
  
  <button class="toggle-panel secondary" onclick="togglePanel()">☰</button>
  
  <div class="components-panel">
    <h3>📦 Components <span id="componentCount">(0)</span></h3>
    <div id="componentsList" class="components-list">
      <div class="no-components">Load a .pen file to see components</div>
    </div>
  </div>
  
  <button class="toggle-components secondary" onclick="toggleComponents()">📦</button>
  
  <div id="drag-overlay" class="drag-overlay">
    <p>Drop .pen file here</p>
  </div>

<script>
// ====== Pen Renderer ======

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// 变量存储
let variables = {};
let rawVariables = {};  // 原始变量定义（含主题信息）
let currentTheme = { Mode: 'Light', Base: 'Neutral', Accent: 'Default' };
let currentZoom = 100;
let penDocument = null;

// 拖拽平移状态
let isDragging = false;
let dragStartX = 0;
let dragStartY = 0;
let panX = 0;
let panY = 0;

// 组件列表
let components = [];
let activeComponentId = null;

// 提取组件
function extractComponents(node, parentX = 0, parentY = 0, result = []) {
  const x = parentX + (node.x || 0);
  const y = parentY + (node.y || 0);
  const width = node.width || 0;
  const height = node.height || 0;
  
  // 如果有名字且是 frame/rectangle/ellipse/text，加入列表
  if (node.name && node.type && ['frame', 'rectangle', 'ellipse', 'text'].includes(node.type)) {
    // 跳过太小的元素和通用名称
    const skipNames = ['Frame', 'Rectangle', 'Ellipse', 'Text', 'Group'];
    if (!skipNames.includes(node.name)) {
      result.push({
        id: node.id,
        name: node.name,
        type: node.type,
        reusable: node.reusable || false,
        x: x,
        y: y,
        width: typeof width === 'number' ? width : 100,
        height: typeof height === 'number' ? height : 100
      });
    }
  }
  
  // 递归子元素
  if (node.children && Array.isArray(node.children)) {
    node.children.forEach(child => {
      extractComponents(child, x, y, result);
    });
  }
  
  return result;
}

// 构建组件列表 UI
function buildComponentsList() {
  const listEl = document.getElementById('componentsList');
  const countEl = document.getElementById('componentCount');
  
  // 只显示可复用组件
  const reusableComponents = components.filter(c => c.reusable);
  countEl.textContent = `(${reusableComponents.length})`;
  
  if (reusableComponents.length === 0) {
    listEl.innerHTML = '<div class="no-components">No reusable components found</div>';
    return;
  }
  
  // 按 shadcn 分类
  const categories = {
    'Form': { icon: '📝', items: [] },
    'Data Display': { icon: '📊', items: [] },
    'Disclosure': { icon: '📂', items: [] },
    'Feedback': { icon: '💬', items: [] },
    'Navigation': { icon: '🧭', items: [] },
    'Overlay': { icon: '🔲', items: [] },
    'Other': { icon: '📦', items: [] }
  };
  
  // 组件名到分类的映射
  const componentCategory = {
    'Button': 'Form', 'Icon Button': 'Form', 'Input': 'Form', 'Input Group': 'Form',
    'Select': 'Form', 'Textarea': 'Form', 'Checkbox': 'Form', 'Radio': 'Form',
    'Switch': 'Form', 'Combobox': 'Form', 'Input OTP': 'Form', 'Input OTP Group': 'Form',
    'Avatar': 'Data Display', 'Badge': 'Data Display', 'Card': 'Data Display',
    'Table': 'Data Display', 'Data Table': 'Data Display',
    'Accordion': 'Disclosure', 'Tabs': 'Disclosure',
    'Alert': 'Feedback', 'Progress': 'Feedback',
    'Sidebar': 'Navigation', 'Breadcrumb': 'Navigation', 'Pagination': 'Navigation',
    'Dialog': 'Overlay', 'Dropdown': 'Overlay', 'Modal': 'Overlay', 'Tooltip': 'Overlay',
    'List': 'Data Display'
  };
  
  // 分类组件
  reusableComponents.forEach(comp => {
    // 提取组件类型名（去掉变体后缀）
    const baseName = comp.name.split('/')[0];
    const category = componentCategory[baseName] || 'Other';
    categories[category].items.push(comp);
  });
  
  // 构建HTML
  let html = '';
  const categoryOrder = ['Form', 'Data Display', 'Disclosure', 'Feedback', 'Navigation', 'Overlay', 'Other'];
  
  categoryOrder.forEach(cat => {
    const items = categories[cat].items;
    if (items.length === 0) return;
    
    html += `<div class="component-category">
      <div class="category-header" onclick="toggleCategory('${cat}')">
        <span>${categories[cat].icon} ${cat}</span>
        <span class="count">${items.length}</span>
      </div>
      <div class="category-items" id="cat-${cat}">`;
    
    items.forEach(comp => {
      // 解析变体名
      const parts = comp.name.split('/');
      const baseName = parts[0];
      const variant = parts.length > 1 ? parts.slice(1).join('/') : '';
      
      html += `<div class="component-item ${activeComponentId === comp.id ? 'active' : ''}" 
                    onclick="focusComponent('${comp.id}')" title="${comp.name}">
        <span class="comp-name">${baseName}</span>
        ${variant ? `<span class="comp-variant">${variant}</span>` : ''}
      </div>`;
    });
    
    html += '</div></div>';
  });
  
  listEl.innerHTML = html;
}

// 切换分类展开/收起
function toggleCategory(cat) {
  const el = document.getElementById('cat-' + cat);
  if (el) {
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
  }
}

// 定位到组件
function focusComponent(id) {
  const comp = components.find(c => c.id === id);
  if (!comp) return;
  
  activeComponentId = id;
  buildComponentsList();
  
  // 获取当前缩放比例（需要与 renderDocument 中的计算一致）
  let minX = 0, minY = 0, maxWidth = canvas.width, maxHeight = canvas.height;
  if (penDocument && penDocument.children) {
    penDocument.children.forEach(child => {
      if (child.x && child.x < minX) minX = child.x;
      if (child.y && child.y < minY) minY = child.y;
      if (child.width && typeof child.width === 'number' && child.width > maxWidth) maxWidth = child.width;
      if (child.height && typeof child.height === 'number' && child.height > maxHeight) maxHeight = child.height;
    });
  }
  
  const baseScale = currentZoom / 100;
  const scaleX = canvas.width / maxWidth;
  const scaleY = canvas.height / maxHeight;
  const fitScale = Math.min(scaleX, scaleY, 1);
  const scale = fitScale * baseScale;
  
  // 计算偏移（与 renderDocument 一致）
  const offsetX = minX < 0 ? -minX : 0;
  const offsetY = minY < 0 ? -minY : 0;
  
  // 计算组件在屏幕上的位置
  const screenX = (comp.x + offsetX) * scale + panX;
  const screenY = (comp.y + offsetY) * scale + panY;
  const screenW = comp.width * scale;
  const screenH = comp.height * scale;
  
  // 判断组件是否在可视区域内（带边距）
  const margin = 50;
  const isVisible = 
    screenX >= margin && 
    screenX + screenW <= canvas.width - margin &&
    screenY >= margin && 
    screenY + screenH <= canvas.height - margin;
  
  if (isVisible) {
    // 已在可视区域内，不移动，只重新渲染（显示高亮）
    renderDocument(penDocument);
    return;
  }
  
  // 不在可视区域，计算居中位置
  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;
  
  // 计算新的 pan 值，使组件居中
  panX = centerX - (comp.x + offsetX + comp.width / 2) * scale;
  panY = centerY - (comp.y + offsetY + comp.height / 2) * scale;
  
  // 重新渲染
  renderDocument(penDocument);
}

// 切换组件面板
function toggleComponents() {
  document.body.classList.toggle('components-hidden');
}

// 初始化画布大小
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  document.getElementById('canvasSize').textContent = `${canvas.width} x ${canvas.height}`;
  if (penDocument) {
    renderDocument(penDocument);
  }
}

// 解析变量
function resolveVariables(doc) {
  variables = {};
  rawVariables = {};
  
  // 从文档获取根节点的主题设置
  if (doc.children && doc.children[0] && doc.children[0].theme) {
    currentTheme = { ...currentTheme, ...doc.children[0].theme };
  }
  
  // 保存原始变量定义
  if (doc.variables) {
    rawVariables = doc.variables;
  }
  
  // 解析每个变量，根据主题选择值
  for (const [key, varDef] of Object.entries(rawVariables)) {
    if (!varDef || !varDef.value) {
      variables[key] = null;
      continue;
    }
    
    // value 可能是数组（多主题）或单个值
    const values = Array.isArray(varDef.value) ? varDef.value : [{ value: varDef.value }];
    
    // 找到匹配当前主题的值
    let matchedValue = null;
    let defaultFallback = null;
    
    for (const item of values) {
      const itemValue = item.value;
      const itemTheme = item.theme;
      
      // 记录默认值（无主题条件的第一个）
      if (!itemTheme && !defaultFallback) {
        defaultFallback = itemValue;
      }
      
      // 检查主题匹配
      if (itemTheme) {
        let matches = true;
        for (const [themeKey, themeVal] of Object.entries(itemTheme)) {
          if (currentTheme[themeKey] !== themeVal) {
            matches = false;
            break;
          }
        }
        if (matches) {
          matchedValue = itemValue;
          break;  // 找到匹配，停止
        }
      }
    }
    
    // 使用匹配值或默认值
    variables[key] = matchedValue || defaultFallback;
  }
  
  console.log('Theme:', currentTheme, 'Variables loaded:', Object.keys(variables).length);
}

// 切换主题
function toggleTheme() {
  currentTheme.Mode = currentTheme.Mode === 'Light' ? 'Dark' : 'Light';
  resolveVariables(penDocument);
  renderDocument(penDocument);
  
  // 更新按钮文字
  const btn = document.getElementById('themeBtn');
  if (btn) {
    btn.textContent = currentTheme.Mode === 'Light' ? '🌙 Dark' : '☀️ Light';
  }
}

// 解析颜色值
function resolveColor(color) {
  if (!color) return null;
  if (typeof color === 'string') {
    if (color.startsWith('$')) {
      return variables[color.slice(1)] || '#888888';
    }
    return color;
  }
  if (color.type === 'gradient') {
    return color.colors?.[0]?.color || '#888';
  }
  return color;
}

// 解析描边粗细
function resolveStrokeThickness(thickness) {
  if (thickness === undefined || thickness === null) return 1;
  if (typeof thickness === 'number') return thickness;
  if (typeof thickness === 'object') {
    // 处理 { top, right, bottom, left } 或 { right: 1 } 格式
    const max = Math.max(
      thickness.top || 0,
      thickness.right || 0,
      thickness.bottom || 0,
      thickness.left || 0
    );
    return max || 1;
  }
  return 1;
}

// 解析尺寸值
function resolveSize(val, parentSize = 0) {
  if (val === 'fill_container') return parentSize;
  if (val === 'fit_content') return null;
  if (typeof val === 'string' && val.startsWith('$')) {
    return variables[val.slice(1)] || 0;
  }
  return val || 0;
}

// 绘制圆角矩形
function drawRoundedRect(ctx, x, y, width, height, radius) {
  if (width <= 0 || height <= 0) return;
  radius = Math.min(radius || 0, width / 2, height / 2);
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + width - radius, y);
  ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
  ctx.lineTo(x + width, y + height - radius);
  ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
  ctx.lineTo(x + radius, y + height);
  ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();
}

// 渲染节点
function renderNode(ctx, node, parentX = 0, parentY = 0, parentWidth = 0, parentHeight = 0) {
  const x = parentX + (node.x || 0);
  const y = parentY + (node.y || 0);
  const width = resolveSize(node.width, parentWidth);
  const height = resolveSize(node.height, parentHeight);
  
  if (width <= 0 || height <= 0) return;
  
  ctx.save();
  
  if (node.opacity !== undefined) {
    ctx.globalAlpha = node.opacity;
  }
  
  switch (node.type) {
    case 'frame':
    case 'rectangle':
      renderFrameOrRect(ctx, node, x, y, width, height);
      break;
    case 'ellipse':
      renderEllipse(ctx, node, x, y, width, height);
      break;
    case 'text':
      renderText(ctx, node, x, y, width, height);
      break;
    case 'line':
      renderLine(ctx, node, x, y, width, height);
      break;
  }
  
  ctx.restore();
  
  if (node.children && node.children.length > 0) {
    renderChildren(ctx, node, x, y, width, height);
  }
}

function renderFrameOrRect(ctx, node, x, y, width, height) {
  if (node.effect && node.effect.type === 'shadow') {
    const shadow = node.effect;
    ctx.shadowColor = resolveColor(shadow.color) || 'rgba(0,0,0,0.1)';
    ctx.shadowBlur = shadow.blur || 0;
    ctx.shadowOffsetX = shadow.offset?.x || 0;
    ctx.shadowOffsetY = shadow.offset?.y || 0;
  }
  
  const fillColor = resolveColor(node.fill);
  if (fillColor) {
    drawRoundedRect(ctx, x, y, width, height, node.cornerRadius || 0);
    ctx.fillStyle = fillColor;
    ctx.fill();
  }
  
  ctx.shadowColor = 'transparent';
  
  if (node.stroke && node.stroke.fill) {
    const strokeColor = resolveColor(node.stroke.fill);
    if (strokeColor) {
      drawRoundedRect(ctx, x, y, width, height, node.cornerRadius || 0);
      ctx.strokeStyle = strokeColor;
      ctx.lineWidth = resolveStrokeThickness(node.stroke.thickness);
      ctx.stroke();
    }
  }
}

function renderEllipse(ctx, node, x, y, width, height) {
  const fillColor = resolveColor(node.fill);
  if (fillColor) {
    ctx.beginPath();
    ctx.ellipse(x + width / 2, y + height / 2, width / 2, height / 2, 0, 0, Math.PI * 2);
    ctx.fillStyle = fillColor;
    ctx.fill();
  }
}

function renderText(ctx, node, x, y, width, height) {
  const fillColor = resolveColor(node.fill);
  if (!fillColor) return;
  
  ctx.fillStyle = fillColor;
  ctx.font = `${node.fontWeight || 'normal'} ${node.fontSize || 16}px -apple-system, sans-serif`;
  ctx.textAlign = node.textAlign || 'left';
  ctx.textBaseline = node.textAlignVertical === 'middle' ? 'middle' : 'top';
  
  const textX = node.textAlign === 'center' ? x + (width || 0) / 2 : x;
  const textY = node.textAlignVertical === 'middle' ? y + (height || 0) / 2 : y;
  
  ctx.fillText(node.content || '', textX, textY);
}

function renderLine(ctx, node, x, y, width, height) {
  const strokeColor = resolveColor(node.stroke?.fill || node.fill);
  if (!strokeColor) return;
  
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + width, y + height);
  ctx.strokeStyle = strokeColor;
  ctx.lineWidth = node.stroke?.thickness || 2;
  ctx.stroke();
}

function renderChildren(ctx, parent, parentX, parentY, parentWidth, parentHeight) {
  if (!parent.children || parent.children.length === 0) return;
  
  const layout = parent.layout || 'none';
  const padding = parent.padding || 0;
  const gap = parent.gap || 0;
  const justifyContent = parent.justifyContent || 'start';
  const alignItems = parent.alignItems || 'start';
  
  let paddingTop, paddingRight, paddingBottom, paddingLeft;
  if (Array.isArray(padding)) {
    if (padding.length === 2) {
      paddingTop = paddingBottom = padding[0];
      paddingLeft = paddingRight = padding[1];
    } else if (padding.length === 4) {
      [paddingTop, paddingRight, paddingBottom, paddingLeft] = padding;
    }
  } else {
    paddingTop = paddingRight = paddingBottom = paddingLeft = padding;
  }
  
  const contentX = parentX + paddingLeft;
  const contentY = parentY + paddingTop;
  const contentWidth = parentWidth - paddingLeft - paddingRight;
  const contentHeight = parentHeight - paddingTop - paddingBottom;
  
  if (layout === 'none') {
    parent.children.forEach(child => {
      renderNode(ctx, child, parentX, parentY, parentWidth, parentHeight);
    });
  } else if (layout === 'horizontal') {
    let startX = contentX;
    const childrenWithWidth = parent.children.map(child => {
      const w = resolveSize(child.width, contentWidth);
      return { child, width: w === null ? 0 : w };
    });
    
    let totalWidth = childrenWithWidth.reduce((sum, { width }) => sum + width, 0) + gap * (parent.children.length - 1);
    
    if (justifyContent === 'center') {
      startX = contentX + (contentWidth - totalWidth) / 2;
    } else if (justifyContent === 'end') {
      startX = contentX + contentWidth - totalWidth;
    } else if (justifyContent === 'space_between' && parent.children.length > 1) {
      const extraSpace = contentWidth - childrenWithWidth.reduce((sum, { width }) => sum + width, 0);
      const spaceBetween = extraSpace / (parent.children.length - 1);
      childrenWithWidth.forEach((item, i) => {
        const childHeight = resolveSize(item.child.height, contentHeight);
        let childY = contentY;
        if (alignItems === 'center') childY = contentY + (contentHeight - childHeight) / 2;
        else if (alignItems === 'end') childY = contentY + contentHeight - childHeight;
        
        renderNode(ctx, item.child, startX, childY, item.width, childHeight);
        startX += item.width + spaceBetween;
      });
      return;
    }
    
    childrenWithWidth.forEach((item, i) => {
      const childHeight = resolveSize(item.child.height, contentHeight);
      let childY = contentY;
      if (alignItems === 'center') childY = contentY + (contentHeight - childHeight) / 2;
      else if (alignItems === 'end') childY = contentY + contentHeight - childHeight;
      
      renderNode(ctx, item.child, startX, childY, item.width, childHeight);
      startX += item.width + gap;
    });
    
  } else if (layout === 'vertical') {
    let currentY = contentY;
    
    parent.children.forEach((child, i) => {
      const childWidth = resolveSize(child.width, contentWidth);
      const childHeight = resolveSize(child.height, contentHeight);
      
      let childX = contentX;
      if (alignItems === 'center') childX = contentX + (contentWidth - childWidth) / 2;
      else if (alignItems === 'end') childX = contentX + contentWidth - childWidth;
      
      renderNode(ctx, child, childX, currentY, childWidth, childHeight);
      currentY += childHeight + gap;
    });
  }
}

// 渲染文档
function renderDocument(doc) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  resolveVariables(doc);
  
  if (doc.children && doc.children.length > 0) {
    // 计算所有根节点的边界
    let minX = 0, minY = 0, maxWidth = canvas.width, maxHeight = canvas.height;
    
    doc.children.forEach(child => {
      if (child.x && child.x < minX) minX = child.x;
      if (child.y && child.y < minY) minY = child.y;
      if (child.width && typeof child.width === 'number' && child.width > maxWidth) maxWidth = child.width;
      if (child.height && typeof child.height === 'number' && child.height > maxHeight) maxHeight = child.height;
    });
    
    // 计算缩放比例以适应画布
    const baseScale = currentZoom / 100;
    const scaleX = canvas.width / maxWidth;
    const scaleY = canvas.height / maxHeight;
    const fitScale = Math.min(scaleX, scaleY, 1);
    const scale = fitScale * baseScale;
    
    // 计算偏移使内容从正确位置开始
    const offsetX = (minX < 0 ? -minX : 0) + panX;
    const offsetY = (minY < 0 ? -minY : 0) + panY;
    
    // 应用变换
    ctx.save();
    ctx.translate(offsetX, offsetY);
    ctx.scale(scale, scale);
    
    doc.children.forEach(child => {
      let width = resolveSize(child.width, maxWidth);
      let height = resolveSize(child.height, maxHeight);
      
      if (!child.width) width = maxWidth;
      if (!child.height) height = maxHeight;
      
      renderNode(ctx, child, child.x || 0, child.y || 0, width, height);
    });
    
    // 高亮选中的组件
    if (activeComponentId) {
      const activeComp = components.find(c => c.id === activeComponentId);
      if (activeComp) {
        ctx.strokeStyle = '#3b82f6';
        ctx.lineWidth = 2 / scale;
        ctx.setLineDash([5 / scale, 5 / scale]);
        ctx.strokeRect(
          activeComp.x - 4,
          activeComp.y - 4,
          activeComp.width + 8,
          activeComp.height + 8
        );
        ctx.setLineDash([]);
        
        // 组件名称标签
        ctx.fillStyle = '#3b82f6';
        ctx.font = `${12 / scale}px -apple-system, sans-serif`;
        ctx.fillText(activeComp.name, activeComp.x, activeComp.y - 8 / scale);
      }
    }
    
    ctx.restore();
  }
}

// 加载并渲染
function loadAndRender(doc) {
  penDocument = doc;
  
  // 提取组件
  components = [];
  if (doc.children) {
    doc.children.forEach(child => {
      extractComponents(child, 0, 0, components);
    });
  }
  buildComponentsList();
  activeComponentId = null;
  
  // 重置视图
  panX = 0;
  panY = 0;
  currentZoom = 100;
  document.getElementById('zoomSlider').value = 100;
  document.getElementById('zoomValue').textContent = '100%';
  
  renderDocument(doc);
}

// 缩放
function setZoom(value) {
  currentZoom = parseInt(value);
  document.getElementById('zoomValue').textContent = currentZoom + '%';
  if (penDocument) renderDocument(penDocument);
}

// 重置视图
function resetView() {
  panX = 0;
  panY = 0;
  currentZoom = 100;
  document.getElementById('zoomSlider').value = 100;
  document.getElementById('zoomValue').textContent = '100%';
  if (penDocument) renderDocument(penDocument);
}

// 切换面板
function togglePanel() {
  document.body.classList.toggle('panel-hidden');
}

// 设置拖拽
function setupPan() {
  canvas.style.cursor = 'grab';
  
  canvas.addEventListener('mousedown', (e) => {
    // 忽略控制面板区域的点击
    if (e.clientX < 200 && e.clientY < 300) return;
    
    isDragging = true;
    dragStartX = e.clientX - panX;
    dragStartY = e.clientY - panY;
    canvas.style.cursor = 'grabbing';
  });
  
  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    panX = e.clientX - dragStartX;
    panY = e.clientY - dragStartY;
    if (penDocument) renderDocument(penDocument);
  });
  
  document.addEventListener('mouseup', () => {
    isDragging = false;
    canvas.style.cursor = 'grab';
  });
  
  // 滚轮缩放
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? -10 : 10;
    const newZoom = Math.max(25, Math.min(400, currentZoom + delta));
    currentZoom = newZoom;
    document.getElementById('zoomSlider').value = newZoom;
    document.getElementById('zoomValue').textContent = newZoom + '%';
    if (penDocument) renderDocument(penDocument);
  }, { passive: false });
}

// 加载示例
async function loadSample() {
  try {
    const response = await fetch('pencil-new.pen');
    const text = await response.text();
    const doc = JSON.parse(text);
    loadAndRender(doc);
  } catch (err) {
    console.error('Failed to load pencil-new.pen:', err);
    // Fallback to sample.pen
    try {
      const response = await fetch('sample.pen');
      const text = await response.text();
      const doc = JSON.parse(text);
      loadAndRender(doc);
    } catch (err2) {
      alert('Failed to load design files');
    }
  }
}

// 下载
function downloadCanvas() {
  const link = document.createElement('a');
  link.download = 'pen-render.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// 拖放
function setupDragDrop() {
  const overlay = document.getElementById('drag-overlay');
  
  document.addEventListener('dragenter', (e) => {
    e.preventDefault();
    overlay.classList.add('active');
  });
  
  overlay.addEventListener('dragleave', (e) => {
    if (e.target === overlay) overlay.classList.remove('active');
  });
  
  overlay.addEventListener('dragover', (e) => e.preventDefault());
  
  overlay.addEventListener('drop', (e) => {
    e.preventDefault();
    overlay.classList.remove('active');
    
    const files = e.dataTransfer.files;
    if (files.length > 0) {
      const file = files[0];
      if (file.name.endsWith('.pen')) {
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const doc = JSON.parse(event.target.result);
            loadAndRender(doc);
          } catch (err) {
            alert('Invalid .pen file: ' + err.message);
          }
        };
        reader.readAsText(file);
      } else {
        alert('Please drop a .pen file');
      }
    }
  });
}

// 初始化
window.onload = () => {
  resizeCanvas();
  setupPan();
  setupDragDrop();
  loadSample();
};

window.onresize = resizeCanvas;
</script>
