<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>.pen Viewer</title>
  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            border: "hsl(var(--border))",
            input: "hsl(var(--input))",
            ring: "hsl(var(--ring))",
            background: "hsl(var(--background))",
            foreground: "hsl(var(--foreground))",
            primary: {
              DEFAULT: "hsl(var(--primary))",
              foreground: "hsl(var(--primary-foreground))",
            },
            secondary: {
              DEFAULT: "hsl(var(--secondary))",
              foreground: "hsl(var(--secondary-foreground))",
            },
            destructive: {
              DEFAULT: "hsl(var(--destructive))",
              foreground: "hsl(var(--destructive-foreground))",
            },
            muted: {
              DEFAULT: "hsl(var(--muted))",
              foreground: "hsl(var(--muted-foreground))",
            },
            accent: {
              DEFAULT: "hsl(var(--accent))",
              foreground: "hsl(var(--accent-foreground))",
            },
            card: {
              DEFAULT: "hsl(var(--card))",
              foreground: "hsl(var(--card-foreground))",
            },
          },
        },
      },
    }
  </script>
  <style>
    :root {
      --background: 0 0% 100%;
      --foreground: 240 10% 3.9%;
      --card: 0 0% 100%;
      --card-foreground: 240 10% 3.9%;
      --primary: 240 5.9% 10%;
      --primary-foreground: 0 0% 98%;
      --secondary: 240 4.8% 95.9%;
      --secondary-foreground: 240 5.9% 10%;
      --muted: 240 4.8% 95.9%;
      --muted-foreground: 240 3.8% 46.1%;
      --accent: 240 4.8% 95.9%;
      --accent-foreground: 240 5.9% 10%;
      --destructive: 0 84.2% 60.2%;
      --destructive-foreground: 0 0% 98%;
      --border: 240 5.9% 90%;
      --input: 240 5.9% 90%;
      --ring: 240 5.9% 10%;
    }
    .dark {
      --background: 240 10% 3.9%;
      --foreground: 0 0% 98%;
      --card: 240 10% 3.9%;
      --card-foreground: 0 0% 98%;
      --primary: 0 0% 98%;
      --primary-foreground: 240 5.9% 10%;
      --secondary: 240 3.7% 15.9%;
      --secondary-foreground: 0 0% 98%;
      --muted: 240 3.7% 15.9%;
      --muted-foreground: 240 5% 64.9%;
      --accent: 240 3.7% 15.9%;
      --accent-foreground: 0 0% 98%;
      --destructive: 0 62.8% 30.6%;
      --destructive-foreground: 0 0% 98%;
      --border: 240 3.7% 15.9%;
      --input: 240 3.7% 15.9%;
      --ring: 240 4.9% 83.9%;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
    }
    
    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }
    
    .control-panel {
      position: fixed;
      top: 16px;
      left: 16px;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);

    .panel-header {
      color: #fff;
      font-size: 14px;

    .panel-header .logo {

    .panel-row {

    button {

    .preview-badge-secondary { background: #f4f4f5; color: #18181b; }

    .preview-input {

<body>
  <canvas id="canvas"></canvas>
  
  <div class="control-panel">
    <div class="panel-header">
      <div class="logo">P</div>
      <span>.pen Viewer</span>
    </div>
    <div class="panel-row">
      <button onclick="loadSample()">Reload</button>
      <button class="secondary" onclick="resetView()">Reset</button>
      <button class="secondary" onclick="toggleTheme()">🌙</button>
      <button class="secondary" onclick="downloadCanvas()">⬇</button>
    </div>
    <div class="zoom-control">
      <span>Zoom:</span>
      <input type="range" id="zoomSlider" min="25" max="400" value="100" onchange="setZoom(this.value)">
      <span id="zoomValue">100%</span>
    </div>
    <div class="info">
      Canvas: <span id="canvasSize">-</span><br>
      🖱️ Drag to pan | Scroll to zoom
    </div>
  </div>
  
  <div class="components-panel" id="componentsPanel">
    <!-- React will render here -->
  </div>
  
  <button class="toggle-components secondary" onclick="toggleComponents()">📦</button>
  <div id="drag-overlay" class="drag-overlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(59,130,246,0.95);z-index:1000;justify-content:center;align-items:center;"><p style="color:white;font-size:24px;">Drop .pen file here</p></div>

<script>
// ====== Main Canvas Renderer ======
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let variables = {};
let rawVariables = {};
let currentTheme = { Mode: 'Light', Base: 'Neutral', Accent: 'Default' };
let currentZoom = 100;
let penDocument = null;
let isDragging = false;
let dragStartX = 0;
let dragStartY = 0;
let panX = 0;
let panY = 0;
let components = [];
let activeComponentId = null;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  document.getElementById('canvasSize').textContent = `${canvas.width} x ${canvas.height}`;
  if (penDocument) renderDocument(penDocument);
}

function resolveVariables(doc) {
  variables = {};
  rawVariables = {};
  if (doc.children && doc.children[0] && doc.children[0].theme) {
    currentTheme = { ...currentTheme, ...doc.children[0].theme };
  }
  if (doc.variables) rawVariables = doc.variables;
  for (const [key, varDef] of Object.entries(rawVariables)) {
    if (!varDef || !varDef.value) { variables[key] = null; continue; }
    const values = Array.isArray(varDef.value) ? varDef.value : [{ value: varDef.value }];
    let matchedValue = null, defaultFallback = null;
    for (const item of values) {
      if (!item.theme && !defaultFallback) defaultFallback = item.value;
      if (item.theme) {
        let matches = true;
        for (const [tk, tv] of Object.entries(item.theme)) {
          if (currentTheme[tk] !== tv) { matches = false; break; }
        }
        if (matches) { matchedValue = item.value; break; }
      }
    }
    variables[key] = matchedValue || defaultFallback;
  }
}

function resolveColor(color) {
  if (!color) return null;
  if (typeof color === 'string') {
    if (color.startsWith('$')) return variables[color.slice(1)] || '#888';
    return color;
  }
  return color.colors?.[0]?.color || '#888';
}

function resolveSize(val, parentSize = 0) {
  if (val === 'fill_container') return parentSize;
  if (val === 'fit_content') return null;
  if (typeof val === 'string' && val.startsWith('$')) return variables[val.slice(1)] || 0;
  return val || 0;
}

function resolveStrokeThickness(thickness) {
  if (thickness === undefined || thickness === null) return 1;
  if (typeof thickness === 'number') return thickness;
  if (typeof thickness === 'object') return Math.max(thickness.top || 0, thickness.right || 0, thickness.bottom || 0, thickness.left || 0) || 1;
  return 1;
}

function drawRoundedRect(ctx, x, y, width, height, radius) {
  if (width <= 0 || height <= 0) return;
  radius = Math.min(radius || 0, width / 2, height / 2);
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + width - radius, y);
  ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
  ctx.lineTo(x + width, y + height - radius);
  ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
  ctx.lineTo(x + radius, y + height);
  ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();
}

function renderNode(ctx, node, parentX = 0, parentY = 0, parentWidth = 0, parentHeight = 0) {
  const x = parentX + (node.x || 0);
  const y = parentY + (node.y || 0);
  const width = resolveSize(node.width, parentWidth);
  const height = resolveSize(node.height, parentHeight);
  if (width <= 0 || height <= 0) return;
  ctx.save();
  if (node.opacity !== undefined) ctx.globalAlpha = node.opacity;
  
  if (node.type === 'frame' || node.type === 'rectangle') {
    if (node.effect && node.effect.type === 'shadow') {
      ctx.shadowColor = resolveColor(node.effect.color) || 'rgba(0,0,0,0.1)';
      ctx.shadowBlur = node.effect.blur || 0;
      ctx.shadowOffsetX = node.effect.offset?.x || 0;
      ctx.shadowOffsetY = node.effect.offset?.y || 0;
    }
    const fillColor = resolveColor(node.fill);
    if (fillColor) {
      drawRoundedRect(ctx, x, y, width, height, node.cornerRadius || 0);
      ctx.fillStyle = fillColor;
      ctx.fill();
    }
    ctx.shadowColor = 'transparent';
    if (node.stroke && node.stroke.fill) {
      const strokeColor = resolveColor(node.stroke.fill);
      if (strokeColor) {
        drawRoundedRect(ctx, x, y, width, height, node.cornerRadius || 0);
        ctx.strokeStyle = strokeColor;
        ctx.lineWidth = resolveStrokeThickness(node.stroke.thickness);
        ctx.stroke();
      }
    }
  } else if (node.type === 'ellipse') {
    const fillColor = resolveColor(node.fill);
    if (fillColor) {
      ctx.beginPath();
      ctx.ellipse(x + width / 2, y + height / 2, width / 2, height / 2, 0, 0, Math.PI * 2);
      ctx.fillStyle = fillColor;
      ctx.fill();
    }
  } else if (node.type === 'text') {
    const fillColor = resolveColor(node.fill);
    if (fillColor) {
      ctx.fillStyle = fillColor;
      ctx.font = `${node.fontWeight || 'normal'} ${node.fontSize || 16}px -apple-system, sans-serif`;
      ctx.textAlign = node.textAlign || 'left';
      ctx.textBaseline = node.textAlignVertical === 'middle' ? 'middle' : 'top';
      ctx.fillText(node.content || '', node.textAlign === 'center' ? x + (width || 0) / 2 : x, node.textAlignVertical === 'middle' ? y + (height || 0) / 2 : y);
    }
  }
  ctx.restore();
  if (node.children && node.children.length > 0) renderChildren(ctx, node, x, y, width, height);
}

function renderChildren(ctx, parent, parentX, parentY, parentWidth, parentHeight) {
  if (!parent.children || parent.children.length === 0) return;
  const layout = parent.layout || 'none';
  const padding = parent.padding || 0;
  const gap = parent.gap || 0;
  const justifyContent = parent.justifyContent || 'start';
  const alignItems = parent.alignItems || 'start';
  let paddingTop, paddingRight, paddingBottom, paddingLeft;
  if (Array.isArray(padding)) {
    if (padding.length === 2) { paddingTop = paddingBottom = padding[0]; paddingLeft = paddingRight = padding[1]; }
    else if (padding.length === 4) [paddingTop, paddingRight, paddingBottom, paddingLeft] = padding;
  } else { paddingTop = paddingRight = paddingBottom = paddingLeft = padding; }
  const contentX = parentX + paddingLeft;
  const contentY = parentY + paddingTop;
  const contentWidth = parentWidth - paddingLeft - paddingRight;
  const contentHeight = parentHeight - paddingTop - paddingBottom;
  
  if (layout === 'none') {
    parent.children.forEach(child => renderNode(ctx, child, parentX, parentY, parentWidth, parentHeight));
  } else if (layout === 'horizontal') {
    let startX = contentX;
    const childrenWithWidth = parent.children.map(child => ({ child, width: resolveSize(child.width, contentWidth) || 0 }));
    if (justifyContent === 'center') startX = contentX + (contentWidth - childrenWithWidth.reduce((s, { width }) => s + width, 0)) / 2;
    else if (justifyContent === 'end') startX = contentX + contentWidth - childrenWithWidth.reduce((s, { width }) => s + width, 0);
    childrenWithWidth.forEach((item, i) => {
      const childHeight = resolveSize(item.child.height, contentHeight);
      let childY = contentY;
      if (alignItems === 'center') childY = contentY + (contentHeight - childHeight) / 2;
      else if (alignItems === 'end') childY = contentY + contentHeight - childHeight;
      renderNode(ctx, item.child, startX, childY, item.width, childHeight);
      startX += item.width + gap;
    });
  } else if (layout === 'vertical') {
    let currentY = contentY;
    parent.children.forEach(child => {
      const childWidth = resolveSize(child.width, contentWidth);
      const childHeight = resolveSize(child.height, contentHeight);
      let childX = contentX;
      if (alignItems === 'center') childX = contentX + (contentWidth - childWidth) / 2;
      else if (alignItems === 'end') childX = contentX + contentWidth - childWidth;
      renderNode(ctx, child, childX, currentY, childWidth, childHeight);
      currentY += childHeight + gap;
    });
  }
}

function renderDocument(doc) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  resolveVariables(doc);
  if (doc.children && doc.children.length > 0) {
    let minX = 0, minY = 0, maxWidth = canvas.width, maxHeight = canvas.height;
    doc.children.forEach(child => {
      if (child.x && child.x < minX) minX = child.x;
      if (child.y && child.y < minY) minY = child.y;
      if (child.width && typeof child.width === 'number' && child.width > maxWidth) maxWidth = child.width;
      if (child.height && typeof child.height === 'number' && child.height > maxHeight) maxHeight = child.height;
    });
    const baseScale = currentZoom / 100;
    const fitScale = Math.min(canvas.width / maxWidth, canvas.height / maxHeight, 1);
    const scale = fitScale * baseScale;
    const offsetX = (minX < 0 ? -minX : 0) + panX;
    const offsetY = (minY < 0 ? -minY : 0) + panY;
    ctx.save();
    ctx.translate(offsetX, offsetY);
    ctx.scale(scale, scale);
    doc.children.forEach(child => {
      let width = resolveSize(child.width, maxWidth);
      let height = resolveSize(child.height, maxHeight);
      if (!child.width) width = maxWidth;
      if (!child.height) height = maxHeight;
      renderNode(ctx, child, child.x || 0, child.y || 0, width, height);
    });
    if (activeComponentId) {
      const activeComp = components.find(c => c.id === activeComponentId);
      if (activeComp) {
        ctx.save();
        ctx.strokeStyle = '#3b82f6';
        ctx.lineWidth = 3 / scale;
        ctx.setLineDash([8 / scale, 4 / scale]);
        ctx.strokeRect(activeComp.x - 6, activeComp.y - 6, activeComp.width + 12, activeComp.height + 12);
        ctx.setLineDash([]);
        const labelHeight = 20 / scale;
        ctx.font = `bold ${12 / scale}px -apple-system, sans-serif`;
        const textWidth = ctx.measureText(activeComp.name).width;
        ctx.fillStyle = '#3b82f6';
        ctx.fillRect(activeComp.x - 6, activeComp.y - 6 - labelHeight, textWidth + 12 / scale, labelHeight);
        ctx.fillStyle = '#ffffff';
        ctx.textBaseline = 'middle';
        ctx.fillText(activeComp.name, activeComp.x, activeComp.y - 6 - labelHeight / 2);
        ctx.restore();
      }
    }
    ctx.restore();
  }
}

function extractComponents(node, parentX = 0, parentY = 0, result = []) {
  const x = parentX + (node.x || 0);
  const y = parentY + (node.y || 0);
  let width = node.width;
  let height = node.height;
  if (typeof width !== 'number' || width <= 0) width = 100;
  if (typeof height !== 'number' || height <= 0) height = 100;
  if (node.name && node.id && node.type && ['frame', 'rectangle', 'ellipse', 'text'].includes(node.type)) {
    const skipNames = ['Frame', 'Rectangle', 'Ellipse', 'Text', 'Group', 'Vector', 'Line', 'Circle'];
    if (!skipNames.includes(node.name)) {
      result.push({ id: node.id, name: node.name, type: node.type, reusable: node.reusable || false, x, y, width, height });
    }
  }
  if (node.children && Array.isArray(node.children)) {
    node.children.forEach(child => extractComponents(child, x, y, result));
  }
  return result;
}

function loadAndRender(doc) {
  penDocument = doc;
  components = [];
  if (doc.children) doc.children.forEach(child => extractComponents(child, 0, 0, components));
  renderReactComponents();
  activeComponentId = null;
  panX = 0; panY = 0; currentZoom = 100;
  document.getElementById('zoomSlider').value = 100;
  document.getElementById('zoomValue').textContent = '100%';
  renderDocument(doc);
}

async function loadSample() {
  try {
    const response = await fetch('pencil-new.pen');
    const doc = JSON.parse(await response.text());
    loadAndRender(doc);
  } catch (err) {
    console.error('Failed:', err);
  }
}

function setZoom(value) {
  currentZoom = parseInt(value);
  document.getElementById('zoomValue').textContent = currentZoom + '%';
  if (penDocument) renderDocument(penDocument);
}

function resetView() {
  panX = 0; panY = 0; currentZoom = 100;
  document.getElementById('zoomSlider').value = 100;
  document.getElementById('zoomValue').textContent = '100%';
  if (penDocument) renderDocument(penDocument);
}

function toggleTheme() {
  currentTheme.Mode = currentTheme.Mode === 'Light' ? 'Dark' : 'Light';
  resolveVariables(penDocument);
  renderDocument(penDocument);
  renderReactComponents();
}

function toggleComponents() {
  document.body.classList.toggle('components-hidden');
}

function focusComponent(id) {
  const comp = components.find(c => c.id === id);
  if (!comp) return;
  activeComponentId = id;
  let minX = 0, minY = 0, maxWidth = canvas.width, maxHeight = canvas.height;
  if (penDocument && penDocument.children) {
    penDocument.children.forEach(child => {
      if (child.x && child.x < minX) minX = child.x;
      if (child.y && child.y < minY) minY = child.y;
      if (child.width && typeof child.width === 'number' && child.width > maxWidth) maxWidth = child.width;
      if (child.height && typeof child.height === 'number' && child.height > maxHeight) maxHeight = child.height;
    });
  }
  const scale = Math.min(canvas.width / maxWidth, canvas.height / maxHeight, 1) * (currentZoom / 100);
  const offsetX = minX < 0 ? -minX : 0;
  const offsetY = minY < 0 ? -minY : 0;
  const screenX = (comp.x + offsetX) * scale + panX;
  const screenY = (comp.y + offsetY) * scale + panY;
  const screenW = comp.width * scale;
  const screenH = comp.height * scale;
  const margin = 50;
  const isVisible = screenX >= margin && screenX + screenW <= canvas.width - margin && screenY >= margin && screenY + screenH <= canvas.height - margin;
  if (!isVisible) {
    panX = canvas.width / 2 - (comp.x + offsetX + comp.width / 2) * scale;
    panY = canvas.height / 2 - (comp.y + offsetY + comp.height / 2) * scale;
  }
  renderDocument(penDocument);
  renderReactComponents();
}

function downloadCanvas() {
  const link = document.createElement('a');
  link.download = 'pen-render.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// Default preview for unknown components
const DefaultPreview = ({ name }) => e('div', { style: { padding: 8, fontSize: 10, color: '#64748b', textAlign: 'center' } }, name.split('/')[0]);

// Category mapping
const componentCategory = {
  'Button': 'Form', 'Icon Button': 'Form', 'Input': 'Form', 'Input Group': 'Form', 'Input OTP': 'Form', 'Input OTP Group': 'Form',
  'Select': 'Form', 'Textarea': 'Form', 'Checkbox': 'Form', 'Radio': 'Form', 'Switch': 'Form', 'Combobox': 'Form',
  'Avatar': 'Data Display', 'Badge': 'Data Display', 'Card': 'Data Display', 'Card Action': 'Data Display', 'Card Plain': 'Data Display', 'Card Image': 'Data Display',
  'Table': 'Data Display', 'Data Table': 'Data Display', 'List': 'Data Display',
  'Accordion': 'Disclosure', 'Tabs': 'Disclosure',
  'Alert': 'Feedback', 'Progress': 'Feedback',
  'Sidebar': 'Navigation', 'Breadcrumb': 'Navigation', 'Pagination': 'Navigation', 'Breadcrumb Item': 'Navigation',
  'Dialog': 'Overlay', 'Dropdown': 'Overlay', 'Modal': 'Overlay', 'Tooltip': 'Overlay',
};

function renderReactComponents() {
  const reusableComponents = components.filter(c => c.reusable);
  const categories = {};
  reusableComponents.forEach(comp => {
    const baseName = comp.name.split('/')[0];
    const category = componentCategory[baseName] || 'Other';
    if (!categories[category]) categories[category] = [];
    categories[category].push(comp);
  });
  
  const categoryOrder = ['Form', 'Data Display', 'Disclosure', 'Feedback', 'Navigation', 'Overlay', 'Other'];
  const categoryIcons = { Form: '📝', 'Data Display': '📊', Disclosure: '📂', Feedback: '💬', Navigation: '🧭', Overlay: '🔲', Other: '📦' };
  
  const elements = categoryOrder.map(cat => {
    const items = categories[cat];
    if (!items || items.length === 0) return null;
    
    return e('div', { key: cat, className: 'category-section' },
      e('div', { className: 'category-title' }, `${categoryIcons[cat] || '📦'} ${cat} (${items.length})`),
      e('div', { className: 'component-grid' },
        items.map(comp => {
          const Preview = ComponentPreviews[comp.name] || (() => e(DefaultPreview, { name: comp.name }));
          return e('div', {
            key: comp.id,
            className: `component-preview ${activeComponentId === comp.id ? 'active' : ''}`,
            onClick: () => focusComponent(comp.id)
          },
            e(Preview),
            e('div', { className: 'component-label' }, comp.name.split('/')[1] || comp.name.split('/')[0])
          );
        })
      )
    );
  }).filter(Boolean);
  
  const container = e('div', null,
    e('h3', null, '📦 Components', e('span', { style: { fontSize: 12, color: '#64748b' } }, ` (${reusableComponents.length})`)),
    elements
  );
  
  ReactDOM.render(container, document.getElementById('componentsPanel'));
}

// Setup
window.onload = () => {
  resizeCanvas();
  loadSample();
  setupPan();
};

window.onresize = resizeCanvas;

function setupPan() {
  canvas.style.cursor = 'grab';
  canvas.addEventListener('mousedown', (e) => {
    const controlPanel = document.querySelector('.control-panel');
    const componentsPanel = document.querySelector('.components-panel');
    if (controlPanel) {
      const rect = controlPanel.getBoundingClientRect();
      if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) return;
    }
    if (componentsPanel) {
      const rect = componentsPanel.getBoundingClientRect();
      if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) return;
    }
    isDragging = true;
    dragStartX = e.clientX - panX;
    dragStartY = e.clientY - panY;
    canvas.style.cursor = 'grabbing';
    e.preventDefault();
  });
  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    panX = e.clientX - dragStartX;
    panY = e.clientY - dragStartY;
    if (penDocument) renderDocument(penDocument);
  });
  document.addEventListener('mouseup', () => {
    if (isDragging) { isDragging = false; canvas.style.cursor = 'grab'; }
  });
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? -10 : 10;
    currentZoom = Math.max(25, Math.min(400, currentZoom + delta));
    document.getElementById('zoomSlider').value = currentZoom;
    document.getElementById('zoomValue').textContent = currentZoom + '%';
    if (penDocument) renderDocument(penDocument);
  }, { passive: false });
}
